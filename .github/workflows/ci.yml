name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  go:
    name: Go vet and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

  web:
    name: Frontend audit and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Build frontend
        run: npm run build

  telemetry-worker:
    name: Telemetry worker audit and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telemetry-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: telemetry-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Test worker
        run: npm test

  scripts:
    name: Script static checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install script analyzers
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          pwsh -NoProfile -Command "Set-PSRepository -Name PSGallery -InstallationPolicy Trusted; Install-Module PSScriptAnalyzer -Scope CurrentUser -Force"

      - name: ShellCheck Linux scripts
        run: shellcheck --severity=error scripts/*.sh

      - name: PowerShell Script Analyzer
        shell: pwsh
        run: |
          Invoke-ScriptAnalyzer -Path scripts -Recurse -Severity Error -EnableExit
